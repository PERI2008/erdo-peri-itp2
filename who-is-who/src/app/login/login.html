<div class="login-box">
  <h2>Anmeldung</h2>

  <div class="field">
    <label>E-Mail</label>
    <input type="email" [(ngModel)]="email" placeholder="beispiel@htl.at">
  </div>

  <div class="field">
    <label>Passwort</label>
    <input type="password" [(ngModel)]="password" placeholder="Passwort">
  </div>

  <button (click)="checkLogin()">Einloggen</button>

  <p *ngIf="message" [class.success]="message.includes('erfolgreich')" [class.error]="!message.includes('erfolgreich')">
    {{ message }}
  </p>
</div>
