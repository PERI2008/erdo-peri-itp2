<div class="register-wrapper">

  <div *ngIf="notificationMessage" class="toast" [ngClass]="notificationType">
    <span class="toast-icon">{{ notificationType === 'success' ? '✅' : '❌' }}</span>
    <span class="toast-text">{{ notificationMessage }}</span>
  </div>

  <div class="register-card">
    <h2>Konto erstellen</h2>
    <p class="subtitle">Registriere dich für das HTL Who-is-Who</p>

    <form (ngSubmit)="goToStepTwo()">
      <div class="form-row">
        <div class="form-group">
          <label>Vorname</label>
          <input type="text" [(ngModel)]="vorname" name="vorname" required />
        </div>
        <div class="form-group">
          <label>Nachname</label>
          <input type="text" [(ngModel)]="nachname" name="nachname" required />
        </div>
      </div>

      <div class="form-group">
        <label>E-Mail-Adresse</label>
        <input type="email" [(ngModel)]="email" name="email" required />
      </div>

      <div class="form-group">
        <label>Passwort</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required />
      </div>

      <div class="form-group">
        <label>Ich bin...</label>
        <div class="role-selection">
          <button type="button" class="role-btn" [class.active]="role === 'schueler'" (click)="role = 'schueler'">
            👨‍🎓 Schüler
          </button>
          <button type="button" class="role-btn" [class.active]="role === 'lehrer'" (click)="role = 'lehrer'">
            👨‍🏫 Lehrer
          </button>
        </div>
      </div>

      <button type="submit" class="submit-btn">Weiter zum Profil-Setup</button>
    </form>

    <div class="login-footer">
      <p>Bereits ein Konto? <span class="register-link" (click)="goToLogin()">Hier anmelden</span></p>
    </div>
  </div>
</div>
