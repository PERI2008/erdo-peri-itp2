<div class="register-box">
  <h2>Account erstellen</h2>

  <div class="field">
    <label>Vorname</label>
    <input type="text" [(ngModel)]="vorname" placeholder="z.B. Max">
  </div>

  <div class="field">
    <label>Nachname</label>
    <input type="text" [(ngModel)]="nachname" placeholder="z.B. Mustermann">
  </div>

  <div class="field">
    <label>E-Mail-Adresse</label>
    <input type="email" [(ngModel)]="email" placeholder="max.mustermann@htl.at">
  </div>

  <div class="field">
    <label>Passwort</label>
    <input type="password" [(ngModel)]="password" placeholder="Passwort wählen">
  </div>

  <div class="field">
    <label>Ich bin:</label>
    <select [(ngModel)]="role">
      <option value="schueler">Schüler/in</option>
      <option value="lehrer">Lehrer/in</option>
    </select>
  </div>

  <button (click)="goToStepTwo()">Weiter zum Profil</button>
</div>
