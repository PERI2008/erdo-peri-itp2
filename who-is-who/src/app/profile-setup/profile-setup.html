<div class="register-box">
  <h2>Profil vervollständigen</h2>
  <p>Willkommen, <strong>{{ vorname }} {{ nachname }}</strong>!</p>
  <p>Du bist als <strong>{{ role === 'schueler' ? 'Schüler/in' : 'Lehrer/in' }}</strong> registriert.</p>

  <hr>

  @if (role === 'schueler') {
    <div class="field">
      <label>Klasse (z.B. 4AHITM)</label>
      <input type="text" [(ngModel)]="klasse" placeholder="Klasse">
    </div>

    <div class="field">
      <label>Geburtsdatum</label>
      <input type="date" [(ngModel)]="geburtsdatum">
    </div>
  }

  @else {
    <div class="field">
      <label>Unterrichtsfach (z.B. ITP)</label>
      <input type="text" [(ngModel)]="fach" placeholder="Fach">
    </div>

    <div class="field">
      <label>Raum (z.B. C3.04)</label>
      <input type="text" [(ngModel)]="raum" placeholder="Raum">
    </div>

    <div class="field checkbox-field">
      <label>
        <input type="checkbox" [(ngModel)]="istKlassenvorstand">
        Ich bin Klassenvorstand
      </label>
    </div>
  }

  <div class="field">
    <label>Über mich (Bio)</label>
    <textarea [(ngModel)]="bio" placeholder="Erzähle etwas über dich..."></textarea>
  </div>

  <button (click)="saveProfile()">Profil speichern</button>
</div>
